<!DOCTYPE html>           

<html>
<head>
    <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Random Sum</title>
  <style>
  hr {
    height: 2px;
    border: none;
    background-image: linear-gradient(to right, #1f2937, #354a5c, #586f7f, rgba(16, 185, 129, 0.6), #586f7f,#354a5c,#1f2937)  ; 
    animation: gradient-animation 7s infinite ease-in;
    background-size: 200% 100%; /* Make the background double the width of the hr */
}
@keyframes gradient-animation {
    0%,100% { background-position: 0% 0%; } /* Start at the left edge */
    50% { background-position: 100% 0%; }
  
}

  html {
    perspective:500px;
    height:100vh;
    width:fixed;
  background: beige;
  font-family: rubik;
  text-align: center;
  font-size: 40px;
  font-family: "Rubik", sans-serif;
  font-optical-sizing: auto;
  font-weight: bold;
  font-style: normal;
    display:flex;
    justify-content:center;
    
}
@keyframes expand{
  0%{
    transform:scale(0);
    
  }
  50%{
    transform:scale(1) rotateX(180deg) rotateY(50deg);
    
  }
  75%{
    transform:scale(1) rotateX(200deg) rotateY(-180deg) rotateZ(50deg)
  }
  100%{
    margin-bottom:5px;
    outline:none;
    transform:rotateY(20deg);
    transform:rotateX(30deg);
    height:200px;
    
  font-size: 3vw;
  padding: 1em 2.7em;
  font-weight: 500;
  background: #1f2937;
  color: white;
  border: none;
  position: relative;
  overflow: hidden;
  border-radius: 0.6em;
  cursor: pointer;
  transition:0.4s;
    margin:10px;
    box-shadow:0px 0px 25px grey
  }
}
  .btn {
    animation:expand 1.5s ease-out;
    margin-bottom:5px;
    outline:none;
    transform:rotateY(20deg);
    transform:rotateX(30deg);
    height:200px;
    
  font-size: 3vw;
  padding: 1em 2.7em;
  font-weight: 500;
  background: #1f2937;
  color: white;
  border: none;
  position: relative;
  overflow: hidden;
  border-radius: 0.6em;
  cursor: pointer;
  transition:0.4s;
    margin:10px;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0); /* For transparent highlight */
  -webkit-tap-highlight-color: transparent;      /* Another option */

    box-shadow:0px 0px 25px grey
}
 .btn:focus {
  outline: none;
}
 
  .buttons{
    flex-direction:column;
    display:flex;
    perspective:1000px;
  }
.container {
  
  display: flex;
  flex-direction: column; 
  justify-content: center;
  align-items: center;
  min-width: 100vw; 
  max-width: 100vw;
  height:100vh;
}
.gradient {
  position: absolute;
  width: 100%;
  height: 100%;
  left: 0;
  top: 0;
  border-radius: 0.6em;
  margin-top: -0.25em;
  background-image: linear-gradient(
    rgba(0, 0, 0, 0),
    rgba(0, 0, 0, 0),
    rgba(0, 0, 0, 0.3)
  );
}

.label {
  font-weight:900;
  position: relative;
  top: -1px;
  transition:0.5s
}
  .label:hover{
    font-weight:500;
    top:-3px
  }

.transition {
  transition-timing-function: cubic-bezier(0, 0, 0.2, 1);
  transition-duration: 500ms;
  background-color: rgba(16, 185, 129, 0.6);
  border-radius: 9999px;
  width: 0;
  height: 0;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.btn:hover .transition {
  width: 14em;
  height: 14em;
}

.btn:hover {
  box-shadow:0px 5px 25px grey;
  background: rgba(16, 185, 129, 0.6) radial-gradient(circle, transparent 1%, rgba(16, 185, 129, 0.6) 10%);
  transform:rotateY(0deg);
  transform:rotateX(0deg);
  font-weight:900!important;
 
     }

.btn:active {
  background-color: rgba(16, 185, 129, 0.6); /* Changing the .btn color when active */
  background-size: 100%;
  transition: 0.2s;
  
}
.form__group {
  position: relative;
  padding: 20px 0 0;
  display:flex;
  margin: 50px;
  justify-content:center;
  align-items:center;
}

.form__field {
  font-family: arial;
  width: 50vw;
  border: none;
  border-bottom: 2px solid #9b9b9b;
  outline: 0;
  font-size: 5vw;
  color: #000;
  padding: 7px 0;
  background:transparent;
  transition: border-color 0.2s;
  text-align:center;
  transform:rotateY(10deg);
  transform:rotateX(10deg);
  transition:all 0.3s;
  margin:20px;
}

.form__field::placeholder {
  color: transparent;
}

.form__field:placeholder-shown ~ .form__label {
  font-size: 17px;
  cursor: text;
  top: 20px;
  transform:rotateY(0deg);
  transform:rotateX(0deg);
}

.form__label {
  position: absolute;
  top: 0;
  margin:-30px;
  transform:rotateY(0deg);
  transform:rotateX(0deg);
  font-weight:300;
  display: block;
  transition: 0.2s;
  font-size: 5vw!important;
  color: #9b9b9b;
  pointer-events: none;
}

.form__field:focus {
  padding-bottom: 6px;
  font-weight: 700;
  border-width: 3px;
  transform-origin:center;
  border-image: linear-gradient(to right,beige, #116399, #38caef, beige);
  border-image-slice: 1;
  }

.form__field:focus ~ .form__label {
  position: absolute;
  top: 0;
  display: block;
  transition: 0.2s;
  font-size: 10vw;
  color: #1f2937;
  font-weight: 500;
}


.form__field:required, .form__field:invalid {
  box-shadow: none;
  
}
.btn:active {
  transform: scale(1.1);
}
@import url('https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');
  #sum{
    font-size:10vw;
  }
  h3{
    font-size:10vw;
    font-weight:800;
    background: linear-gradient(
        45deg,
        #7953cd 20%,
        #00affa 30%,
        #0190cd 70%,
        #764ada 80%,
        #D8B5FF,
        #1EAE98
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-fill-color: transparent;
    background-size: 500% auto;
    animation: textShine 5s ease-in-out infinite alternate;
}
  @keyframes textShine {
    0% {
        background-position: 0% 50%;
    }
    100% {
        background-position: 100% 50%;
    }
}
::selection{
  background:#00affa;
  color:black
}
    </style>
</head>
<body>
  
  <div class="container">
    <h3 class="h3">Take random Sum</h3>  <div class="buttons"> 
 <button class="btn" onclick="randomSum()">
  <span class="transition"></span>
  <span class="gradient"></span>
  <span class="label" ><hr>Get Random Sum<hr></span>
</button>
     <button class="btn" onclick="" id="ansbtn">
  <span class="transition"></span>
  <span class="gradient"></span>
  <span class="label" ><hr>Reveal Answer<hr></span>
</button></div>
<div class="form__group">
    <input type="number" id="number" class="form__field" placeholder="Name" required value="1">
    <label for="name" class="form__label">Enter the value of digits</label>
</div>
  
  <p id="sum"></p>
    </div>
  <script>
 let num2;
  let answer;
  let random1;
  let operator;
  function randomSum(){
     let str = "0"
    let num = document.getElementById("number").value
    
if (num >=300){
    document.getElementById("sum").innerHTML = "Please enter a number less than 300"
  return
}
    if (num >=17){
     document.getElementById("sum").style.fontSize = "30px"
    }else{
      document.getElementById("sum").style.fontSize = "5vw"

    }
    let number =  (1+(str.repeat(num)))
    random1 = Math.floor(Math.random()*number)
    let randomSign = Math.floor(Math.random() * 4)
    num2 = Math.floor(Math.random()*number)
    
    
    if (randomSign == 1){
      operator = "+";
      answer = random1 + num2
    }
    if (randomSign == 2){
      operator = "-"
      answer = random1 - num2
    }
    if (randomSign ==3){
      operator = "×"
      answer = random1 * num2
    }
    if (randomSign == 0){
      operator = "/"
      if (num2 === 0){num2 = 1}
      answer = random1 / num2
      }
          
    document.getElementById("sum").innerHTML = `${random1} ${operator} ${num2}`

  document.getElementById("ansbtn").addEventListener('click', function() {
    
    document.getElementById("sum").innerHTML = `The answer of ${random1} ${operator} ${num2} is ${answer}`;
  })
  
    if (isNaN(num) || num < 1){
  document.getElementById("sum").textContent = "Please enter a number"
return
}
  }
  
  
  </script>
</body>
</html>
